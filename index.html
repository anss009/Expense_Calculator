<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Calculator</title>
</head>
<link rel="stylesheet" href="style.css">

<body>
    <header>
        <div class="box">
            <div>Budget:</div>
            <div class="input">
                <input type="text" id="total_amount"  placeholder="Enter Total Amount"><br>
            </div>
            <div>
                <button>Set Budget</button>
            </div>
        </div>
        <div class="box">
            <div> Expenses: </div>
            <div class="input">
                <input type="text" placeholder="Enter Title of product"> <br>
                <input type="text" placeholder="Enter Cost of product"> <br>
            </div>
            <div>
                <button>Check Amount</button>
            </div>
        </div>
    </header>
    <div class="middle">
        <div class="blue-card">
            <div class="names">
                <span>Total Budget</span>
                <span class="total">000</span>
            </div>
            <div class="names">
                <span>Expenses</span>
                <span>000</span>
            </div>
            <div class="names">
                <span>Balance</span>
                <span>000</span>
            </div </div>
        </div>
        <div class="last">
            <div>

            </div>
            <div class="expense-list">
    <div class="heading">Expense List</div>
</div>
        </div>
        <script src="script.js"></script>
</body>

</html>
